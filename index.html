<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>PROJECT SKULL</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #050507;
        overflow: hidden;
        font-family: "Courier New", monospace;
        /* Block browser pinch-zoom, double-tap-zoom and pull-to-refresh so a
           two-finger play (move + attack) never zooms or pans the page. */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-text-size-adjust: 100%;
      }
      #game-root {
        position: fixed;
        /* Constrain the play area to the phone's safe area (away from camera
           cutouts / rounded corners). Phaser measures this element's box, so
           insetting it here is what actually centers the canvas correctly. */
        top: env(safe-area-inset-top);
        right: env(safe-area-inset-right);
        bottom: env(safe-area-inset-bottom);
        left: env(safe-area-inset-left);
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 40%, #15151c 0%, #050507 70%);
      }
      /* Crisp pixel scaling */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #b3001b;
        z-index: 10;
        letter-spacing: 0.4em;
        transition: opacity 0.5s ease;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash h1 {
        font-size: 2rem;
        margin: 0;
        text-shadow: 0 0 12px rgba(179, 0, 27, 0.6);
      }
      #boot-splash p {
        color: #555;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <h1>PROJECT&nbsp;SKULL</h1>
      <p>loading the carnage&hellip;</p>
    </div>
    <div id="game-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
